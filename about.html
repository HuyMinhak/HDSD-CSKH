<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | QuanLyCSKH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0c29;  /* fallback for old browsers */
            background: -webkit-linear-gradient(to right, #24243e, #302b63, #0f0c29);  
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29); 
            color: #fff;
            overflow: hidden;
        }

        /* Hiệu ứng bong bóng nền */
        .circle { position: absolute; border-radius: 50%; filter: blur(60px); z-index: 0; }
        .circle-1 { width: 300px; height: 300px; background: #00d2ff; top: -100px; left: -100px; animation: float 6s ease-in-out infinite; }
        .circle-2 { width: 400px; height: 400px; background: #ff007a; bottom: -150px; right: -100px; animation: float 8s ease-in-out infinite reverse; }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(50px); }
            100% { transform: translateY(0); }
        }

        /* Thẻ Card Thông Tin Kính Mờ */
        .about-card {
            position: relative;
            z-index: 10;
            width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.5s;
        }
        .about-card:hover { transform: translateY(-10px); border-color: rgba(255, 255, 255, 0.3); }

        /* Logo / Avatar */
        .logo-box {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5em; color: white;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            border: 4px solid rgba(255,255,255,0.1);
        }

        h1 { font-size: 1.8em; font-weight: 800; letter-spacing: 1px; margin-bottom: 5px; 
             background: linear-gradient(to right, #00d2ff, #ff007a);
             -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .version { font-size: 0.9em; color: #a0a5b1; margin-bottom: 25px; font-weight: 300; }

        .info-list { text-align: left; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .info-list p { margin-bottom: 12px; font-size: 0.95em; display: flex; align-items: center; gap: 15px; }
        .info-list i { color: #00d2ff; width: 20px; text-align: center; }
        .info-list span { color: #a0a5b1; width: 90px; }

        .tech-stack { margin-top: 30px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tech-badge {
            background: rgba(255,255,255,0.1);
            padding: 5px 12px; border-radius: 15px;
            font-size: 0.8em; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .footer { margin-top: 30px; font-size: 0.8em; color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="about-card">
        <div class="logo-box">
            <i class="fa-solid fa-code"></i>
        </div>
        <h1>QuanLyCSKH Pro</h1>
        <div class="version">Phiên bản 2026.1.0 (Premium)</div>

        <div class="info-list">
            <p><i class="fa-solid fa-user-astronaut"></i> <span>Tác giả:</span> <strong>HUYMINH</strong></p>
            <p><i class="fa-solid fa-calendar-days"></i> <span>Năm:</span> <strong>2026</strong></p>
            <p><i class="fa-solid fa-graduation-cap"></i> <span>Đơn vị:</span> <strong>Khoa CNTT - AGU</strong></p>
            <p><i class="fa-solid fa-envelope"></i> <span>Liên hệ:</span> <strong>minh_dth235699@student.agu.edu.vn</strong></p>
        </div>

        <div class="tech-stack">
            <div class="tech-badge">C# .NET</div>
            <div class="tech-badge">SQL Server</div>
            <div class="tech-badge">RDLC Report</div>
            <div class="tech-badge">UI/UX Web</div>
        </div>

        <div class="footer">
            &copy; 2026 HUYMINH. All rights reserved.
        </div>
    </div>

</body>
</html>
